<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morse Code Translator</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%2311998e'/><stop offset='100%' stop-color='%238E2DE2'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23grad)'/><circle cx='35' cy='50' r='12' fill='white'/><rect x='55' y='42' width='30' height='16' rx='8' fill='white'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <h1 class="main-title">Morse Code Translator</h1>

    <div class="cards-wrapper">

      <!-- Card 1: Text to Morse -->
      <div class="card card-purple">
        <div class="card-half card-top">
          <div class="card-header">
            <span class="date" id="dateText"></span>
            <div class="menu-icon">
              <span></span><span></span><span></span>
            </div>
          </div>
          <h2>Text <span>&#709;</span></h2>
          <div class="input-group">
            <textarea id="inputText" placeholder="Type text here..." autocomplete="off"></textarea>
            <span class="unit">ENG<br>TXT</span>
          </div>
        </div>

        <button class="swap-btn" onclick="translateToMorse()" title="Translate to Morse">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
          </svg>
        </button>

        <div class="card-half card-bottom">
          <div class="output-group">
            <textarea id="outputMorse" readonly placeholder="Morse output..."></textarea>
            <div class="unit-wrapper">
              <span class="unit-dark">REV<br>MRS</span>
              <button class="copy-btn" onclick="copyToClipboard('outputMorse', this)" title="Copy to clipboard">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Card 2: Morse to Text -->
      <div class="card card-emerald">
        <div class="card-half card-top">
          <div class="card-header">
            <span class="date" id="dateMorse"></span>
            <div class="menu-icon">
              <span></span><span></span><span></span>
            </div>
          </div>
          <h2>Morse <span>&#709;</span></h2>
          <div class="input-group">
            <textarea id="inputMorse" placeholder="Type morse here..." autocomplete="off"></textarea>
            <span class="unit">REV<br>MRS</span>
          </div>
        </div>

        <button class="swap-btn" onclick="translateToEnglish()" title="Translate to Text">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
          </svg>
        </button>

        <div class="card-half card-bottom">
          <div class="output-group">
            <textarea id="outputText" readonly placeholder="Text output..."></textarea>
            <div class="unit-wrapper">
              <span class="unit-dark">ENG<br>TXT</span>
              <button class="copy-btn" onclick="copyToClipboard('outputText', this)" title="Copy to clipboard">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
